      const item = cases[id];
      document.title = `${item.title} | 金科瓷砖·岩板`;
      document.getElementById("title").textContent = item.title;
      document.getElementById("summary").textContent = item.summary;
      document.getElementById("cover").src = item.image;
      document.getElementById("cover").alt = item.title;
      document.getElementById("needs").innerHTML = item.needs.map((text) => `<li>${text}</li>`).join("");
      document.getElementById("products").innerHTML = item.products.map((text) => `<span>${text}</span>`).join("");
      document.getElementById("caseGallery").innerHTML = `
        <div class="case-gallery__item case-gallery__item--large"><img src="${item.gallery[0].image}" alt="${item.gallery[0].label}" loading="lazy"><span>${item.gallery[0].label}</span></div>
        <div class="case-gallery__stack">
          ${item.gallery.slice(1).map((media) => `<div class="case-gallery__item"><img src="${media.image}" alt="${media.label}" loading="lazy"><span>${media.label}</span></div>`).join("")}
        </div>
      `;
      document.getElementById("productPicks").innerHTML = item.productIds
        .map((productId) => {
          const product = productCards[productId];
          return `<a class="product-pick" href="./product.html?id=${productId}"><img src="${product.image}" alt="${product.title}" loading="lazy"><div><span>${product.tag}</span><strong>${product.title}</strong></div></a>`;
        })
        .join("");
      document.getElementById("moreCases").innerHTML = Object.entries(cases)
        .filter(([key]) => ["villa", "residential", "commercial", "hotel"].includes(key) && key !== id)
        .slice(0, 3)
        .map(([key, value]) => `<a class="more-case" href="./case.html?id=${key}"><img src="${value.image}" alt="${value.title}" loading="lazy"><div><span>PROJECT</span><strong>${value.title}</strong></div></a>`)
        .join("");
    </script>
  </body>
</html>
